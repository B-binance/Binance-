<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .header {
            background: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #f3ba2f;
        }
        .logo {
            font-size: 40px;
            color: #f3ba2f;
        }
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #f3ba2f;
            letter-spacing: 2px;
        }
        .tagline {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #f3ba2f;
        }
        p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            padding: 15px 40px;
            background: #f3ba2f;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        a:hover {
            background: #e0a800;
        }
        .admin-link {
            background: #666;
            color: white;
            font-size: 12px;
            padding: 10px 20px;
            margin-top: 40px;
        }
        .admin-link:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">₿</div>
        <div class="logo-text">BINANCE</div>
        <div class="tagline">THE WORLD'S LEADING CRYPTO EXCHANGE</div>
    </div>

    <div class="container">
        <h1>Welcome to Binance</h1>
        <p>Trade cryptocurrencies with the world's most trusted exchange. Secure, fast, and reliable trading platform.</p>
        
        <div class="button-group">
            <a href="login.html">Login</a>
            <a href="ads.html">View Ads</a>
        </div>

        <a href="admin.html" class="admin-link">Admin Panel</a>
    </div>
</body>
</html>
