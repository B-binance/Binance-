<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
        }
        .header {
            background: #111;
            padding: 20px;
            border-bottom: 2px solid #f3ba2f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #f3ba2f;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #f3ba2f;
            text-align: center;
        }
        .info-box {
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #f3ba2f;
            margin-bottom: 30px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #999;
            font-weight: 600;
        }
        .info-value {
            color: #f3ba2f;
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a, button {
            padding: 12px 30px;
            background: #f3ba2f;
            color: #000;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }
        a:hover, button:hover {
            background: #e0a800;
        }
        .logout-btn {
            background: #d32f2f;
            color: white;
        }
        .logout-btn:hover {
            background: #b71c1c;
        }
        .ads-btn {
            background: #1976d2;
            color: white;
        }
        .ads-btn:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">₿ BINANCE</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h1>Welcome to Your Dashboard</h1>
        
        <div class="info-box">
            <div class="info-row">
                <span class="info-label">Username:</span>
                <span class="info-value" id="username">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label">Login Time:</span>
                <span class="info-value" id="loginTime">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status:</span>
                <span class="info-value">✓ Logged In</span>
            </div>
        </div>

        <div class="button-group">
            <a href="ads.html" class="ads-btn">View Ads</a>
            <a href="index.html">Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (!localStorage.getItem('loggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Display user information
        document.getElementById('username').textContent = localStorage.getItem('username') || 'Unknown';
        document.getElementById('loginTime').textContent = localStorage.getItem('loginTime') || 'Unknown';
        
        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('username');
            localStorage.removeItem('password');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
